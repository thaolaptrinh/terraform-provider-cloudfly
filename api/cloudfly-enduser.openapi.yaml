              previous:
                type: string
                format: uri
                x-nullable: true
              results:
                type: array
                items:
                  $ref: '#/definitions/PublicKey'
        '401':
          description: Authentication failed due to invalid credentials.
          schema:
            type: object
            properties:
              detail:
                type: string
                default: 'Invalid Token.'
        '404':
          description: The resource was not found.
          schema:
            type: object
            properties:
              detail:
                type: string
                default: 'The resource you requested could not be found.'
        '500':
          description: An internal server error occurred.
          schema:
            type: object
            properties:
              detail:
                type: string
                default: 'Internal Server Error.'
      tags:
        - Instances
    parameters: []
  /instances/{id}/change-password:
    post:
      operationId: instances_change_password
      description: 'Change password of an instance'
      summary: 'Change password'
      parameters:
        - name: data
          in: body
          required: true
          schema:
            $ref: '#/definitions/InstanceChangePassword'
      responses:
        '200':
          description: Password changed successfully
          schema:
            type: object
            properties:
              detail:
                type: string
                default: Change instance password successfully
        '401':
          $ref: '#/responses/UnauthorizedError'
        '400':
          $ref: '#/responses/BadRequestError'
        '404':
          $ref: '#/responses/NotFoundError'
        '500':
          $ref: '#/responses/InternalServerError'
      tags:
        - Instances
    parameters:
      - name: id
        in: path
        description: A unique value identifying this instance.
        required: true
        type: string

  /instances/{id}/start:
    get:
      operationId: instances_start
      description: 'Start instance, change instances status from STOPPED to ACTIVE'
      summary: 'Start instance'
      parameters: []
      responses:
        '200':
          description: Instance started successfully
          schema:
            type: object
            properties:
              detail:
                type: string
                default: Instance started'
        '401':
          $ref: '#/responses/UnauthorizedError'
        '400':
          description: Bad request
          schema:
            type: object
            properties:
              detail:
                type: string
                default: Unable to start instance $instance_name.
        '404':
          $ref: '#/responses/NotFoundError'
        '500':
          $ref: '#/responses/InternalServerError'
      tags:
        - Instances
    parameters:
      - name: id
        in: path
        description: A unique value identifying this instance.
        required: true
        type: string
