swagger: '2.0'
info:
  title: CloudFly EndUser API
  contact:
    name: Nhinn
    email: nhinn@cloudfly.vn
  x-logo:
    url: 'https://my.cloudfly.vn/assets/img/logoblue.png'
    altText: CloudFly Logo
  version: '1.0'
  description: |
    # Introduction

    The CloudFly API is a set of HTTP endpoints that adhere to RESTful design principles and CRUD actions with predictable URLs. It uses standard HTTP response codes, authentication, and error messages. The API has consistent and well-formed JSON requests and responses with cursor-based pagination to simplify handling. Error messages are descriptive and easy to understand. Functions in the CloudFly portal are accessible via the API, enabling you to script complex unattended scenarios with any tool fluent in HTTP.

    ## Requests

    Communicate with the API by making an HTTP request at the correct endpoint. The chosen method determines the action taken.

    | Method | Usage |
    | ------ | ------ |
    | DELETE | Use the DELETE to destroy a resource in your account. If it is not found, the operation will return a 4xx error and an appropriate message. |
    | GET    | To retrieve information about a resource, use the GET method. The data is returned as a JSON object. GET methods are read-only and do not affect any resources. |
    | PATCH  | Some resources support partial modification with the PATCH, which modifies specific attributes without updating the entire object representation. |
    | POST   | Issue a POST to create a new object. Include all needed attributes in the request body encoded as JSON. |
    | PUT    | Use the PUT method to update information about a resource. PUT will set new values on the item without regard to their current values. |

    ## Response Codes

    We use standard HTTP response codes to show the success or failure of requests. Response codes in the 2xx range indicate success, while codes in the 4xx range indicate an error, such as an authorization failure or a malformed request. All 4xx errors will return a JSON response object with an *error* attribute explaining the error. Codes in the 5xx range indicate a server-side problem preventing CloudFly from fulfilling your request.

    | Response       | Description |
    | -------------- | ----------- |
    | 200 OK         | The response contains your requested information. |
    | 201 Created    | Your request was accepted. The resource was created. |
    | 202 Accepted   | Your request was accepted. The resource was created or updated. |
    | 204 No Content | Your request succeeded, there is no additional information returned. |
    | 400 Bad Request| Your request was malformed. |
    | 401 Unauthorized | You did not supply valid authentication credentials. |
    | 403 Forbidden  | You are not allowed to perform that action. |
    | 404 Not Found  | No results were found for your request. |
    | 429 Too Many Requests | Your request exceeded the API rate limit. |
    | 500 Internal Server Error | We were unable to perform the request due to server-side problems. |

host: api.cloudfly.vn/backend
schemes:
  - https
basePath: /api
consumes:
  - application/json
produces:
  - application/json
securityDefinitions:
  Token:
    type: apiKey
    name: Authorization
    in: header
    format: Token
security:
  - Token: []
tags:
  - name: Instances
    x-displayName: Instances
    description: |
      CloudFly Cloud instances can be deployed with your preferred operating system or pre-installed application in seconds. 

      Standard - Meets most needs - Equipped with a 2.6GHz Intel Xeon V4 CPU and ultra-fast Enterprise SSD storage. 

      Premium - For high-performance applications - Equipped with Intel Xeon Gold/Platinum Gen2 CPU and ultra-fast Enterprise NVMe storage.

paths:
  /instances:
    get:
      operationId: instances_list
      description: |
        To list all Instances in your account, send a GET request to <code>/api/instances</code>.

        The response body will be a JSON object with a key of <code>results</code>. This will be set to an array containing objects each representing an Instance. These will contain the standard Instance attributes.

      summary: 'List Instance'
      parameters:
        - name: search
          in: query
          description: A search term.
          required: false
          type: string
        - name: limit
          in: query
          description: Number of results to return per page.
          required: false
          type: integer
        - name: offset
          in: query
          description: The initial index from which to return the results.
          required: false
          type: integer
      responses:
        '200':
          description: A JSON object with an <code>results</code> key
          schema:
            required:
              - count
              - results
            type: object
            properties:
              count:
                type: integer
              next:
                type: string
                format: uri
                x-nullable: true
              previous:
                type: string
                format: uri
                x-nullable: true
              results:
                type: array
                items:
                  $ref: '#/definitions/ListInstance'
        '401':
          $ref: '#/responses/UnauthorizedError'
        '404':
          $ref: '#/responses/NotFoundError'
        '500':
          $ref: '#/responses/InternalServerError'
      tags:
        - Instances
    post:
      operationId: instances_create
      description: |
        To create a new Instance, send a POST request to <code>/api/instances</code> setting the required attributes.

        An Instance will be created using the provided information. The response body will contain a JSON object with a key called instance. The value will be an object containing the standard attributes for your new Instance. The response code, 201 Accepted, does not indicate the success or failure of the operation, just that the request has been accepted for processing.

        ### Create Multiple Instances

        Creating multiple Instances is very similar to creating a single Instance. Instead of sending <code>name</code> as a string, send <code>instance_name</code> as an array of strings. An Instance will be created for each name you send using the associated information. Up to ten Instances may be created this way at a time.
      summary: 'Create Instance'
      parameters:
        - name: data
          in: body
          required: true
          description: 'Include a JSON object in the request body with a content type of application/json.'
          schema:
            oneOf:
              - $ref: '#/definitions/InstanceCreate'
              - $ref: '#/definitions/InstanceCreateMultiple'
          x-examples:
            Single Droplet Create Request:
              value:
                name: 'example.com'
                region: 'nyc3'
                size: 's-1vcpu-1gb'
                image: 'ubuntu-20-04-x64'
            Multiple Droplet Create Request:
              value:
                instance_name:
                  - 'example1.com'
                  - 'example2.com'
                region: 'nyc3'
                size: 's-1vcpu-1gb'
                image: 'ubuntu-20-04-x64'
      responses:
        '201':
          description: 'Accepted'
          schema:
            type: object
            properties:
              detail:
                type: string
                default: The server has been successfully initialized. Please wait a moment
        '401':
          $ref: '#/responses/UnauthorizedError'
        '404':
          $ref: '#/responses/NotFoundError'
        '500':
          $ref: '#/responses/InternalServerError'
        '400':
          $ref: '#/responses/BadRequestError'
      tags:
        - Instances
      x-examples:
        application/json:
          my-example-name:
            summary: Some Example
            value:
              message: OK
              type: success
          another-example:
            summary: Another Example
            value:
              message: Something went wrong
              type: error
      x-code-samples:
        - lang: cURL
          source: |
            curl --location 'https://api.cloudfly.vn/backend/api/instances' \
            --header 'Authorization: Token `TOKEN`' \
            --header 'Content-Type: application/json' \
            --data '{
              "region": "HN-Cloud01",
              "image_name": "CentOS-7.9",
              "flavor_type": "Standard",
              "ram": 1,
              "vcpus": 1,
              "disk": 20,
              "enable_ipv6": false,
              "enable_private_network": false,
              "auto_backup": false
            }'
        - lang: Python
          source: |
            import requests
            import json

            url = "https://api.cloudfly.vn/backend/api/instances"

            payload = {
              "region": "HN-Cloud01",
              "image_name": "CentOS-7.9",
              "flavor_type": "Standard",
              "ram": 1,
              "vcpus": 1,
              "disk": 20,
              "enable_ipv6": False,
              "enable_private_network": False,
              "auto_backup": False
            }
            headers = {
              'Authorization': 'Token `TOKEN`',
              'Content-Type': 'application/json',
            }
            response = requests.request("POST", url, headers=headers, json=payload)
        - lang: PHP
          source: |
            <?php
            $curl = curl_init();
            curl_setopt_array($curl, array(
              CURLOPT_URL => 'https://api.cloudfly.vn/backend/api/instances',
              CURLOPT_RETURNTRANSFER => true,
              CURLOPT_ENCODING => '',
              CURLOPT_MAXREDIRS => 10,
              CURLOPT_TIMEOUT => 0,
              CURLOPT_FOLLOWLOCATION => true,
              CURLOPT_HTTP_VERSION => CURL_HTTP_VERSION_1_1,
              CURLOPT_CUSTOMREQUEST => 'POST',
              CURLOPT_POSTFIELDS =>'{
              "region": "HN-Cloud01",
              "image_name": "CentOS-7.9",
              "flavor_type": "Standard",
              "ram": 1,
              "vcpus": 1,
              "disk": 20,
              "enable_ipv6": false,
              "enable_private_network": false,
              "auto_backup": false
            }',
              CURLOPT_HTTPHEADER => array(
                'Authorization: Token `TOKEN`',
                'Content-Type: application/json',
              ),
            ));
            $response = curl_exec($curl);
            curl_close($curl);
        - lang: JavaScript
          source: |
            const resp = await fetch(
              `https://api.cloudfly.vn/backend/api/instances`,
              {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  Authorization: 'Token `TOKEN`',
                },
                body: JSON.stringify({
                  region: "HN-Cloud01",
                  image_name: "CentOS-7.9",
                  flavor_type: "Standard",
                  ram: 1,
                  vcpus: 1,
                  disk: 20,
                  enable_ipv6: false,
                  enable_private_network: false,
                  auto_backup: false
                })
              }
            );

            const data = await resp.json();
            console.log(data);
        - lang: NodeJs
          source: |
            var request = require('request');
            var options = {
              'method': 'POST',
              'url': 'https://api.cloudfly.vn/backend/api/instances',
              'headers': {
                'Authorization': 'Token `TOKEN`',
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                "region": "HN-Cloud01",
                "image_name": "CentOS-7.9",
                "flavor_type": "Standard",
                "ram": 1,
                "vcpus": 1,
                "disk": 20,
                "enable_ipv6": false,
                "enable_private_network": false,
                "auto_backup": false
              })

            };
            request(options, function (error, response) {
              if (error) throw new Error(error);
              console.log(response.body);
            });
        - lang: Java
          source: |
            import java.net.*;
            import java.net.http.*;
            import java.util.*;

            public class App {
              public static void main(String[] args) throws Exception {
                var httpClient = HttpClient.newBuilder().build();

                var payload = String.join("\n"
                  , "{"
                  , " \"region\": \"HN-Cloud01\","
                  , " \"image_name\": \"CentOS-7.9\","
                  , " \"flavor_type\": \"Standard\","
                  , " \"ram\": \"1\","
                  , " \"vcpus\": \"1\","
                  , " \"disk\": \"20\","
                  , " \"enable_ipv6\": \"false\","
                  , " \"enable_private_network\": \"false\","
                  , " \"auto_backup\": \"false\""
                  , "}"
                );

                var request = HttpRequest.newBuilder()
                  .POST(HttpRequest.BodyPublishers.ofString(payload))
                  .uri(URI.create("https://api.cloudfly.vn/backend/api/instances"))
                  .header("Content-Type", "application/json")
                  .header("Authorization", "Token `TOKEN`")
                  .build();

                var response = httpClient.send(request, HttpResponse.BodyHandlers.ofString());

                System.out.println(response.body());
              }
            }
        - lang: C#
          source: |
            using System;
            using System.Net.Http;
            using System.Threading.Tasks;
            using System.Text;
            using System.Text.Json;
            using System.Net.Http.Headers;

            public class Program
            {
              public static async Task Main()
              {
                System.Net.Http.HttpClient client = new();

                client.DefaultRequestHeaders.Authorization = new AuthenticationHeaderValue(@"Token", `TOKEN`);

                string json = JsonSerializer.Serialize(new
                {
                  region: "HN-Cloud01",
                  image_name: "CentOS-7.9",
                  flavor_type: "Standard",
                  ram: 1,
                  vcpus: 1,
                  disk: 20,
                  enable_ipv6: false,
                  enable_private_network: false,
                  auto_backup: false
                });

                using StringContent postData = new(json, Encoding.UTF8, "application/json");
                using HttpResponseMessage request = await client.PostAsync("https://api.cloudfly.vn/backend/api/instances", postData);
                string response = await request.Content.ReadAsStringAsync();

                Console.WriteLine(response);
              }
            }
    parameters: []
  /instances/{id}:
    get:
      operationId: instances_detail
      description: To show information about an individual Instance, send a GET request to <code>/api/instances/$INSTANCE_ID</code>.
      summary: 'Instance Detail'
      parameters: []
      responses:
        '200':
          description: The response will be a JSON object. This will be set to a JSON object that contains the standard Instance attributes
          schema:
            $ref: '#/definitions/InstanceDetail'
        '401':
          $ref: '#/responses/UnauthorizedError'
        '404':
          $ref: '#/responses/NotFoundError'
        '500':
          $ref: '#/responses/InternalServerError'
      tags:
        - Instances
    delete:
      operationId: instances_delete
      description: |
        To delete a Instance, send a DELETE request to <code>/api/instances/$INSTANCE_ID</code>.

        A successful request will receive a 200 status code with no body in response. This indicates that the request was processed successfully.
      summary: 'Instance Delete'
      parameters: []
      responses:
        '200':
          description: 'Accepted'
          schema:
            type: object
            properties:
              detail:
                type: string
                default: Delete instance is in progress, please wait a moment
        '401':
          $ref: '#/responses/UnauthorizedError'
        '404':
          $ref: '#/responses/NotFoundError'
        '400':
          description: Unable to destroy instance.
          schema:
            type: object
            properties:
              detail:
                type: string
                default: 'Unable to destroy instance $instance_name.'
        '500':
          $ref: '#/responses/InternalServerError'
        '409':
          description: Can not delete instance month, year.
      tags:
        - Instances
    parameters:
      - name: id
        in: path
        description: A unique value identifying this instance.
        required: true
        type: string
  /instances/get_options:
    get:
      operationId: instances_get_options
      description: 'Get Options'
      summary: 'Get Options'
      responses:
        '200':
          description: ''
          schema:
            type: object
            properties:
              configs:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      default: ''
                    description:
                      type: string
                      default: ''
                    prices:
                      type: object
                      properties:
                        price_per_month:
                          type: number
                          default: 0
                        price_per_hour:
                          type: number
                          default: 0
                    region:
                      type: object
                      properties:
                        name:
                          type: string
                          default: ''
                        description:
                          type: string
                          default: ''
                    memory_mb:
                      type: integer
                      default: 0
                    vcpus:
                      type: integer
                      default: 0
                    root_gb:
                      type: integer
                      default: 0
                    flavor_group:
                      type: object
                      properties:
                        name:
                          type: string
                          default: ''
                        description:
                          type: string
                          default: ''
                        max_ip_addon:
                          type: integer
                          default: 0
        '401':
          $ref: '#/responses/UnauthorizedError'
        '404':
          $ref: '#/responses/NotFoundError'
        '500':
          $ref: '#/responses/InternalServerError'
      tags:
        - Instances
    parameters: []
  /cloud-regions:
    get:
      operationId: instances_cloud_regions
      description: 'List all available regions.'
      summary: 'List Regions'
      responses:
        '200':
          description: A JSON object with an <code>results</code> key
          schema:
            required:
              - count
              - results
            type: object
            properties:
              count:
                type: integer
              next:
                type: string
                format: uri
                x-nullable: true
              previous:
                type: string
                format: uri
                x-nullable: true
              results:
                type: array
                items:
                  $ref: '#/definitions/CloudRegion'
        '401':
          $ref: '#/responses/UnauthorizedError'
        '404':
          $ref: '#/responses/NotFoundError'
        '500':
          $ref: '#/responses/InternalServerError'
      tags:
        - Instances
    parameters: []
  /instances/get_price:
    post:
      operationId: instances_get_price
      description: 'Get Price'
      summary: 'Get Price'
      parameters:
        - name: data
          in: body
          required: true
          schema:
            $ref: '#/definitions/GetPrice'
      responses:
        '200':
          description: A JSON object
          schema:
            type: object
            properties:
              price_per_month:
                type: number
              price_per_hour:
                type: number
        '401':
          description: Authentication failed due to invalid credentials.
          schema:
            type: object
            properties:
              detail:
                type: string
                default: 'Invalid Token.'
        '404':
          description: The resource was not found.
          schema:
            type: object
            properties:
              detail:
                type: string
                default: 'The resource you requested could not be found.'
        '500':
          description: An internal server error occurred.
          schema:
            type: object
            properties:
              detail:
                type: string
                default: 'Internal Server Error.'
      tags:
        - Instances
    parameters: []
  /instances/{id}/rebuild:
    post:
      operationId: instances_rebuild
      description: 'Rebuild Server (Warning: The servers internal data will be permanently deleted when the server is Rebuilt.)'
      summary: 'Rebuild Server'
      parameters:
        - name: data
          in: body
          required: true
          schema:
            type: object
            properties:
              image_id:
                title: Image ID
                type: string
                description: The Application image to use when rebuild this instance.
      responses:
        '200':
          description: Rebuilding server.
          schema:
            type: object
            properties:
              detail:
                type: string
                default: 'Rebuilding server.'
        '401':
          $ref: '#/responses/UnauthorizedError'
        '400':
          $ref: '#/responses/BadRequestError'
        '404':
          $ref: '#/responses/NotFoundError'
        '500':
          $ref: '#/responses/InternalServerError'
      tags:
        - Instances
    parameters:
      - name: id
        in: path
        description: A unique value identifying this instance.
        required: true
        type: string
