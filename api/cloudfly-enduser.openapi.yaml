    get:
      operationId: instances_get_backup_schedules
      description: 'This is the list of backup schedules for the instance.'
      summary: 'Backup Schedules'
      parameters: []
      responses:
        '200':
          description: List of backup schedules
          schema:
            type: array
            items:
              $ref: '#/definitions/BackupSchedule'
        '401':
          $ref: '#/responses/UnauthorizedError'
        '404':
          $ref: '#/responses/NotFoundError'
        '500':
          $ref: '#/responses/InternalServerError'
      tags:
        - Instances
    parameters:
      - name: id
        in: path
        description: A unique value identifying this instance.
        required: true
        type: string
