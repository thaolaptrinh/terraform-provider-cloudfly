definitions:
  APIResponse:
    type: object
    properties:
      success:
        title: Success
        type: boolean
        default: false
      messages:
        type: array
        items:
          type: string
          minLength: 1
      error_code:
        title: Error code
        type: integer
        default: 0
      data:
        title: Data
        type: object
        additionalProperties:
          type: string
        default: {}
  BillingProduct:
    title: Product
    required:
      - name
      - code
      - product_type
      - price_model
      - group
    type: object
    properties:
      id:
        title: Random id
        type: integer
        maximum: 9223372036854775807
        minimum: -9223372036854775808
      name:
        title: Name
        type: string
        maxLength: 255
        minLength: 1
      description:
        title: Description
        type: string
        maxLength: 1024
        x-nullable: true
      code:
        title: Code
        description: Human readable id
        type: string
        maxLength: 255
        minLength: 1
      product_type:
        title: Product type
        type: string
        maxLength: 16
        minLength: 1
      status:
        title: Status
        type: string
        enum:
          - public
          - private
          - retired
      price_model:
        title: Price model
        type: string
        enum:
          - free
          - fixed_and_dynamic
          - dynamic_or_fixed
      auto_setup:
        title: Auto setup
        type: string
        enum:
          - disabled
          - on_order
          - first_payment
          - manual
      taxable:
        title: Taxable
        description: Add level 1 and 2 tax rates if applicable
        type: boolean
      requires_domain:
        title: Requires domain
        type: boolean
      hide_services:
        title: Hide services
        type: boolean
      billing_type:
        title: Billing type
        type: string
        maxLength: 64
        x-nullable: true
      group:
        title: Group
        type: integer
      module:
        title: Module
        type: integer
